name: film_app
description: A premium movie streaming app.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  get_it: ^7.6.4
  dio: ^5.3.3
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  carousel_slider: ^5.1.2
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  video_player: ^2.8.1
  wakelock_plus: ^1.1.4
  screen_brightness: ^1.0.1
  youtube_player_flutter: ^10.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

